services:
  # PostgreSQL — included for users who don't have PG installed.
  # If you already have PostgreSQL running locally, comment out this service
  # and set LOCAL_DB_URL in backend/.env to point to your existing instance.
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: restorex-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: pg_backup_manager
  #   ports:
  #     - "5433:5432"
  #   volumes:
  #     - restorex-pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   networks:
  #     - restorex-net

  backend:
    build: ./backend
    container_name: restorex-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    volumes:
      # Host drives — add/remove lines based on your available drives
      - C:/:/host/C
      - D:/:/host/D
      # App data persisted on D: drive (logs, encryption key)
      - D:/ProyectBackupAutomatico/logs:/app/logs
      - D:/ProyectBackupAutomatico/data:/app/data
    networks:
      - restorex-net

  frontend:
    build: ./frontend
    container_name: restorex-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - restorex-net

# volumes:
#   restorex-pgdata:
#     driver: local

networks:
  restorex-net:
    driver: bridge
